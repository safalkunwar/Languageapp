<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DualLingo - Learn English & Chinese</title>
    <meta name="description" content="A bilingual language learning web application focused on English and Chinese learners.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>DualLingo</h1>
            <div class="controls">
                <label for="mode-toggle" class="toggle-label">I want to learn:</label>
                <select id="mode-toggle">
                    <option value="en">English (I am Chinese)</option>
                    <option value="zh">Chinese (I am English)</option>
                </select>
            </div>
        </header>

        <nav class="app-nav">
            <button id="nav-learn" class="nav-btn active">Learning Levels</button>
            <button id="nav-dialogues" class="nav-btn">Dialogues</button>
            <button id="nav-translate" class="nav-btn">Voice Translator</button>
        </nav>

        <main id="main-content">
            <!-- Learning View: Select Level -->
            <div id="level-selector" class="view">
                <h2>Select a Level</h2>
                <div class="grid" id="levels-grid"></div>
            </div>

            <!-- Learning View: Flashcards & Quiz -->
            <div id="learning-view" class="view hidden">
                <button id="back-btn" class="btn secondary">← Back to Levels</button>
                <h2 id="current-level-title"></h2>
                
                <div class="card-container" id="flashcard-container">
                    <div id="flashcard" class="card">
                        <!-- Card content -->
                    </div>
                </div>
                
                <div class="card-container hidden" id="quiz-container">
                    <div class="card">
                        <h3>Quiz Time!</h3>
                        <p id="quiz-question"></p>
                        <div class="quiz-options" id="quiz-options">
                            <!-- Options injected here -->
                        </div>
                    </div>
                </div>

                <div class="navigation-controls" id="card-controls">
                    <button id="prev-btn" class="btn secondary">Previous</button>
                    <div class="audio-controls">
                        <button id="play-en-btn" class="btn primary">🔊 Play English 🇺🇸</button>
                        <button id="play-zh-btn" class="btn primary">🔊 Play Chinese 🇨🇳</button>
                    </div>
                    <button id="next-btn" class="btn secondary">Next</button>
                </div>
            </div>

            <!-- Dialogues View: Select Dialogue -->
            <div id="dialogues-selector" class="view hidden">
                <h2>Select a Dialogue</h2>
                <div class="grid" id="dialogues-grid"></div>
            </div>

            <!-- Dialogues View: Chat Interface -->
            <div id="dialogue-chat-view" class="view hidden">
                <button id="back-dialogue-btn" class="btn secondary">← Back to Dialogues</button>
                <h2 id="current-dialogue-title"></h2>
                
                <div class="chat-container" id="chat-container">
                    <!-- Chat bubbles injected here -->
                </div>
            </div>

            <!-- Translator View -->
            <div id="translator-view" class="view hidden">
                <h2>Live Voice Translator</h2>
                <p class="subtitle">Speak and get instant translations!</p>
                
                <div class="translator-container">
                    <div class="input-box">
                        <label>You say:</label>
                        <textarea id="trans-input" placeholder="Click the mic to speak or type here..."></textarea>
                        <div class="action-row">
                            <button id="start-mic-btn" class="btn primary">🎤 Start Listening</button>
                            <span id="mic-status">Ready</span>
                        </div>
                    </div>
                    
                    <div class="output-box">
                        <label>Translation:</label>
                        <div class="translation-result" id="trans-output">Translation will appear here...</div>
                        <div class="action-row">
                            <button id="play-trans-btn" class="btn">🔊 Play Translation</button>
                            <button id="translate-btn" class="btn primary">Translate Text</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
